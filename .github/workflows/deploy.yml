name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # =========================
    # Docker login
    # =========================
    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # =========================
    # Build + Push Backend
    # =========================
    - name: Build & Push Backend
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/backend:latest ./backend
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/backend:latest

    # =========================
    # Build + Push Frontend
    # =========================
    - name: Build & Push Frontend
      run: |
        docker build -t docker.io/${{ secrets.DOCKER_USERNAME }}/frontend:latest ./frontend
        docker push docker.io/${{ secrets.DOCKER_USERNAME }}/frontend:latest

    # =========================
    # Auth to GCP
    # =========================
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2

    # =========================
    # Get GKE credentials
    # =========================
    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials sit323-hd-cluster-1 \
          --zone australia-southeast1-a \
          --project ${{ secrets.GCP_PROJECT_ID }}

    # =========================
    # Deploy
    # =========================
    - name: Deploy to GKE only once
      run: |
        if kubectl get deployment backend && kubectl get deployment frontend; then
          echo "Frontend and Backend already deployed. Skipping."
          exit 0
        fi

        kubectl apply -f k8s/
        
    # Debug
    - name: Verify
      run: |
        kubectl get pods
        kubectl get services
        Kubctle get nodes
